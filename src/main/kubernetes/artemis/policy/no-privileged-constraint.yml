apiVersion: constraints.gatekeeper.sh/v1beta1
kind: no-privileged-container
metadata:
  name: no-priv-container-constraint
  namespace: artemis
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet"]
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: artemis
