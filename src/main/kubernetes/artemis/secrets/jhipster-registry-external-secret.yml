apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-secret
  namespace: external-secrets
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true" 
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "artemis" # Allow reflection to the "artemis" namespace
spec:
  refreshInterval: "10m"
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: registry-secret
    creationPolicy: Owner
  data:
  - secretKey: SPRING_SECURITY_USER_PASSWORD
    remoteRef:
      key: ARTEMIS_JHIPSTER_REGISTRY_PASSWORD
  - secretKey: JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET
    remoteRef:
      key: ARTEMIS_JHIPSTER_JWT_SECRET