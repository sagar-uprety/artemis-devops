# -- targetWorkloads is a comma seperated list of Kubernetes workload resources
# to be included in the vulnerability and config-audit scans
# if left blank, all workload resources will be scanned
targetWorkloads: "pod,replicaset,replicationcontroller,statefulset,daemonset,cronjob,job"

# Vulnerability scanning configuration
operator:
  vulnerabilityScannerEnabled: true
    # -- scannerReportTTL the flag to set how long a report should exist. "" means that the ScannerReportTTL feature is disabled
  scannerReportTTL: "24h"
  sbomGenerationEnabled: true
  configAuditScannerEnabled: true
  rbacAssessmentScannerEnabled: true
  infraAssessmentScannerEnabled: true
  clusterComplianceEnabled: true
  exposedSecretScannerEnabled: true
  # -- vulnerabilityScannerScanOnlyCurrentRevisions the flag to only create vulnerability scans on the current revision of a deployment.
  vulnerabilityScannerScanOnlyCurrentRevisions: true
  # -- configAuditScannerScanOnlyCurrentRevisions the flag to only create config audit scans on the current revision of a deployment.
  configAuditScannerScanOnlyCurrentRevisions: true
  # Access to global secrets and service accounts for pulling images from private registries
  accessGlobalSecretsAndServiceAccount: true
  # Security-related container context
  scanJobPodTemplateContainerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    privileged: false
    readOnlyRootFilesystem: true

image:
  registry: "mirror.gcr.io"
  repository: "aquasec/trivy-operator"

# Trivy scanner configuration
trivy:
  # Severity levels to report
  severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
  image:
    registry: mirror.gcr.io
    repository: aquasec/trivy
    tag: 0.65.0
  # Ignore unfixed vulnerabilities
  ignoreUnfixed: true
  # Enable offline scanning
  offlineScan: false
  # Scan timeout
  timeout: "5m0s"
  
  # Server security settings
  server:
    podSecurityContext:
      runAsUser: 65534
      runAsNonRoot: true
      fsGroup: 65534
    securityContext:
      privileged: false
      readOnlyRootFilesystem: true

# Compliance configuration
compliance:
  # Compliance specs to be used by the cluster compliance scanner
  specs:
    - k8s-cis-1.23
    - k8s-nsa-1.0
    - k8s-pss-baseline-0.1
    - k8s-pss-restricted-0.1
  # -- cron this flag control the cron interval for compliance report generation
  cron: 0 */6 * * * # every 6 hours

# Security context for the operator itself
securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Node collector security configuration
nodeCollector:
  registry: ghcr.io
  # -- repository of the node-collector image
  repository: aquasecurity/node-collector
  # -- tag version of the node-collector image
  tag: 0.3.1
  # Mount paths for security scanning
  volumeMounts:
    - name: var-lib-etcd
      mountPath: /var/lib/etcd
      readOnly: true
    - name: var-lib-kubelet
      mountPath: /var/lib/kubelet
      readOnly: true
    - name: var-lib-kube-scheduler
      mountPath: /var/lib/kube-scheduler
      readOnly: true
    - name: var-lib-kube-controller-manager
      mountPath: /var/lib/kube-controller-manager
      readOnly: true
    - name: etc-systemd
      mountPath: /etc/systemd
      readOnly: true
    - name: lib-systemd
      mountPath: /lib/systemd/
      readOnly: true
    - name: etc-kubernetes
      mountPath: /etc/kubernetes
      readOnly: true
    - name: etc-cni-netd
      mountPath: /etc/cni/net.d/
      readOnly: true
